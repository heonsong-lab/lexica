<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lexica - English Dictionary</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f14;
    --bg2: #1a1a24;
    --bg3: #22222f;
    --border: #2e2e3e;
    --text: #e8e8f0;
    --text2: #9090a8;
    --accent: #7c6aff;
    --accent2: #a594ff;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --noun: #60a5fa;
    --verb: #4ade80;
    --adj: #fbbf24;
    --adv: #f472b6;
  }
  [data-theme="light"] {
    --bg: #f5f5fa;
    --bg2: #ffffff;
    --bg3: #eeeef5;
    --border: #d8d8e8;
    --text: #1a1a2e;
    --text2: #505068;
    --accent: #5244d4;
    --accent2: #6355e8;
    --noun: #1a6fd4;
    --verb: #1a9444;
    --adj: #b87800;
    --adv: #c4306a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* Header */
  .header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Lora', serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
    display: inline-block;
  }
  .logo-text {
    color: var(--text);
  }
  .logo-i-wrap {
    position: relative;
    display: inline-block;
  }
  .logo-i-body {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-i-dot {
    position: absolute;
    top: 1px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    background: radial-gradient(circle, #fff 0%, #fbbf24 45%, #f59e0b 100%);
    border-radius: 50%;
    box-shadow: 0 0 5px 2px rgba(251,191,36,0.55), 0 0 10px 3px rgba(251,191,36,0.18);
  }
  .logo-sub {
    color: var(--text2);
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    display: block;
    letter-spacing: 0.3px;
    margin-top: 4px;
  }
  .theme-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
  }

  /* Nav */
  .nav {
    display: flex;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 65px;
    z-index: 99;
  }
  .nav-btn {
    flex: 1;
    padding: 12px;
    background: none;
    border: none;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .nav-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  /* Pages */
  .page { display: none; padding: 16px 20px 80px; }
  .page.active { display: block; }

  /* Search */
  .search-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: stretch;
  }
  .search-box {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 10px;
    gap: 8px;
    overflow: hidden;
  }
  .search-box input {
    flex: 1;
    min-width: 0;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
  }
  .search-box input::placeholder { color: var(--text2); }
  .icon-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    padding: 4px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
  }
  .icon-btn:hover, .icon-btn.active { color: var(--accent2); }
  .search-btn {
    background: var(--accent);
    border: none;
    border-radius: 12px;
    padding: 0 14px;
    height: 46px;
    color: white;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .search-btn:active { background: var(--accent2); }

  /* Camera overlay */
  .camera-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .camera-overlay.active { display: flex; }
  .camera-overlay video { width: 100%; max-width: 400px; border-radius: 16px; }
  .camera-overlay canvas { display: none; }
  .camera-btns { display: flex; gap: 16px; }
  .cam-btn {
    padding: 12px 24px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
  }
  .cam-capture { background: var(--accent); color: white; }
  .cam-cancel { background: var(--bg3); color: var(--text); }

  /* Result card */
  .word-title {
    font-family: 'Lora', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .syllable-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 16px;
    color: var(--text2);
    margin-bottom: 16px;
  }

  /* Pronunciation */
  .section-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text2);
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 20px;
  }
  .pron-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .pos-badge {
    font-size: 13px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 6px;
    white-space: nowrap;
    line-height: 1.4;
  }
  .pos-badge.syn-label {
    white-space: normal;
    line-height: 1.6;
    display: inline-block;
    word-break: break-word;
  }
  .pos-badge.syn-label .as-in-text {
    font-size: 14px;
    font-weight: 400;
    opacity: 0.85;
    display: block;
    margin-top: 2px;
  }
  .pos-noun { background: rgba(96,165,250,0.15); color: var(--noun); }
  .pos-verb { background: rgba(74,222,128,0.15); color: var(--verb); }
  .pos-adjective { background: rgba(251,191,36,0.15); color: var(--adj); }
  .pos-adverb { background: rgba(244,114,182,0.15); color: var(--adv); }
  .pos-other { background: rgba(168,162,158,0.15); color: #a8a29e; }
  .ipa {
    font-size: 18px;
    color: var(--accent2);
    flex: 1;
    font-style: italic;
  }
  .audio-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .audio-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .audio-btn.playing { background: var(--accent); color: white; }

  /* Definitions */
  .def-group { margin-bottom: 16px; }
  .def-group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .def-group-header .pos-badge { font-size: 13px; padding: 5px 10px; }
  .def-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .def-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    background: var(--accent);
    color: white;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .def-text { font-size: 16px; line-height: 1.6; color: var(--text); }
  .korean-meanings-block {
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .korean-meaning-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .korean-meaning-row .pos-badge { font-size: 13px; padding: 5px 10px; }
  .korean-meaning-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }
  .def-korean { font-size: 13px; color: var(--accent2); margin-top: 6px; font-weight: 500; }
  .def-example {
    font-size: 16px;
    color: var(--text2);
    font-style: italic;
    margin-top: 6px;
    padding-left: 12px;
    border-left: 2px solid var(--border);
    line-height: 1.5;
  }

  /* Synonyms */
  .syn-group {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .syn-group-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .syn-level {
    font-size: 15px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 6px;
    margin-top: 10px;
  }
  .syn-level.high { color: var(--green); }
  .syn-level.mid { color: var(--yellow); }
  .syn-level.low { color: var(--text2); }
  .syn-chips { display: flex; flex-wrap: wrap; gap: 6px; }

  /* Collocations */
  .colloc-group {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .colloc-category {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 8px;
    margin-top: 6px;
    letter-spacing: 0.3px;
  }
  .colloc-category:first-child { margin-top: 0; }
  .colloc-category .cat-label {
    font-size: 11px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    margin-right: 6px;
    color: var(--text2);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .colloc-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .colloc-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 16px;
    color: var(--accent2);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .colloc-chip:active { background: var(--accent); color: white; border-color: var(--accent); }
  .colloc-example {
    font-size: 13px;
    color: var(--text2);
    font-style: italic;
    margin-top: 8px;
    padding-left: 10px;
    border-left: 2px solid var(--border);
    line-height: 1.6;
  }
  .syn-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 15px;
    cursor: pointer;
    color: var(--text);
    transition: all 0.2s;
  }
  .syn-chip:hover { background: var(--accent); color: white; border-color: var(--accent); }

  /* Save button */
  .save-btn {
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: white;
    box-shadow: 0 4px 20px rgba(124,106,255,0.4);
    z-index: 50;
    transition: transform 0.2s;
  }
  .save-btn:hover { transform: scale(1.1); }
  .save-btn.saved { background: var(--green); }

  /* History */
  .history-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-word { font-size: 16px; font-weight: 500; }
  .history-time { font-size: 12px; color: var(--text2); }

  /* Vocabulary */
  .vocab-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .vocab-item:hover { border-color: var(--accent); }
  .vocab-word { font-size: 18px; font-weight: 600; font-family: 'Playfair Display', serif; }
  .vocab-info { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .vocab-delete {
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    padding: 4px;
    float: right;
  }

  /* States */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }
  .empty-state svg { margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 15px; }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
    gap: 16px;
    color: var(--text2);
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 12px;
    padding: 16px;
    color: var(--red);
    text-align: center;
    font-size: 14px;
  }

  /* Voice recording indicator */
  .voice-indicator {
    display: none;
    align-items: center;
    gap: 8px;
    background: rgba(124,106,255,0.1);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--accent2);
  }
  .voice-indicator.active { display: flex; }
  .voice-dot {
    width: 8px;
    height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Clear history btn */
  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--text2);
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 12px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-header-title { font-size: 14px; font-weight: 600; color: var(--text2); }
</style>
</head>
<body data-theme="light">

<div class="header">
  <div class="logo">
    <span class="logo-text">Lex</span><span class="logo-i-wrap"><span class="logo-i-body">i</span><span class="logo-i-dot"></span></span><span class="logo-text">ca</span>
    <span class="logo-sub">Every word, fully understood.</span>
  </div>
  <button class="theme-btn" onclick="toggleTheme()">🌙 다크</button>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showPage('search')">🔍 검색</button>
  <button class="nav-btn" onclick="showPage('vocab')">📚 단어장</button>
  <button class="nav-btn" onclick="showPage('history')">🕐 기록</button>
</div>

<!-- Search Page -->
<div class="page active" id="page-search">
  <div style="margin-top:12px">
    <div class="search-wrap">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text2);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="단어를 입력하세요..." onkeydown="if(event.key==='Enter')searchWord()">
        <button class="icon-btn" id="mic-btn" onclick="toggleVoice()" title="음성 검색">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button class="icon-btn" onclick="openCamera()" title="카메라 검색">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
      </div>
      <button class="search-btn" onclick="searchWord()">검색</button>
    </div>

    <div class="voice-indicator" id="voice-indicator">
      <div class="voice-dot"></div>
      <span>듣는 중... 단어를 말해주세요</span>
    </div>

    <div id="result-area">
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <p>단어를 검색해보세요</p>
        <p style="font-size:13px;margin-top:8px">타이핑, 음성, 카메라로 검색 가능해요</p>
      </div>
    </div>
  </div>
</div>

<!-- Vocabulary Page -->
<div class="page" id="page-vocab">
  <div style="margin-top:12px">
    <div class="section-header">
      <span class="section-header-title" id="vocab-count">저장된 단어 0개</span>
      <button class="clear-btn" onclick="clearVocab()">전체 삭제</button>
    </div>
    <div id="vocab-list">
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <p>저장된 단어가 없어요</p>
        <p style="font-size:13px;margin-top:8px">검색 후 ＋ 버튼을 눌러 저장하세요</p>
      </div>
    </div>
  </div>
</div>

<!-- History Page -->
<div class="page" id="page-history">
  <div style="margin-top:12px">
    <div class="section-header">
      <span class="section-header-title" id="history-count">검색 기록 0개</span>
      <button class="clear-btn" onclick="clearHistory()">전체 삭제</button>
    </div>
    <div id="history-list">
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <p>검색 기록이 없어요</p>
      </div>
    </div>
  </div>
</div>

<!-- Camera Overlay -->
<div class="camera-overlay" id="camera-overlay">
  <p style="color:white;font-size:14px">단어가 보이도록 카메라를 맞춰주세요</p>

function getKoreanForDef(word, pos, defIndex) {
  const w = word.toLowerCase();
  // Check per-definition map first
  if (koreanDefMap[w] && koreanDefMap[w][pos]) {
    const arr = koreanDefMap[w][pos];
    return arr[Math.min(defIndex, arr.length - 1)];
  }
  // Fall back to general koreanDict (split by comma)
  if (koreanDict[w] && koreanDict[w][pos]) {
    const meanings = koreanDict[w][pos].split(',');
    return meanings[Math.min(defIndex, meanings.length - 1)].trim();
  }
  // Fall back to any pos in dict
  if (koreanDict[w]) {
    const firstPos = Object.values(koreanDict[w])[0];
    return firstPos.split(',')[0].trim();
  }
  return getKoreanFallback(word, pos, defIndex);
}

function getKorean(word, pos) {
  return getKoreanForDef(word, pos, 0);
}

// ==================== VOICE ====================
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('이 브라우저는 음성 인식을 지원하지 않아요. Chrome을 사용해주세요.');
    return;
  }
  if (isListening) {
    stopVoice();
  } else {
    startVoice();
  }
}

function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onresult = (e) => {
    const word = e.results[0][0].transcript.trim();
    document.getElementById('search-input').value = word;
    stopVoice();
    searchWord();
  };
  recognition.onerror = () => stopVoice();
  recognition.onend = () => stopVoice();
  recognition.start();
  isListening = true;
  document.getElementById('mic-btn').classList.add('active');
  document.getElementById('voice-indicator').classList.add('active');
}

function stopVoice() {
  if (recognition) recognition.stop();
  isListening = false;
  document.getElementById('mic-btn').classList.remove('active');
  document.getElementById('voice-indicator').classList.remove('active');
}

// ==================== CAMERA ====================
async function openCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('camera-video').srcObject = cameraStream;
    document.getElementById('camera-overlay').classList.add('active');
  } catch (e) {
    alert('카메라 접근 권한이 필요해요.');
  }
}

function closeCamera() {
  if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
  document.getElementById('camera-overlay').classList.remove('active');
}

async function capturePhoto() {
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('camera-canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  closeCamera();
  
  // Use Tesseract.js for OCR
  const resultArea = document.getElementById('result-area');
  resultArea.innerHTML = '<div class="loading"><div class="spinner"></div><p>텍스트 인식 중...</p></div>';
  
  try {
    const { createWorker } = Tesseract;
    const worker = await createWorker('eng');
    const { data: { text } } = await worker.recognize(canvas);
    await worker.terminate();
    const words = text.trim().split(/\s+/).filter(w => /^[a-zA-Z]+$/.test(w));
    if (words.length > 0) {
      const word = words[0];
      document.getElementById('search-input').value = word;
      searchWord();
    } else {
      resultArea.innerHTML = '<div class="error-msg">단어를 인식하지 못했어요. 다시 시도해주세요.</div>';
    }
  } catch (e) {
    // Fallback: ask user to type
    resultArea.innerHTML = '<div class="error-msg">OCR 오류가 발생했어요. 직접 입력해주세요.</div>';
  }
}

const MW_DICT_KEY = '1a9af73a-c959-40a8-b99e-618d541162ec';
const MW_THES_KEY = '0e339640-930d-4d44-a61f-9460283a2760';

// ==================== MW API HELPERS ====================
// Parse MW dictionary entries into structured data
function parseMWDict(data, word) {
  // Returns merged entries: one per POS, US pronunciation only
  // { pos, ipa, ipaStandard, audioFile, defs: [{text, examples}] }
  if (!Array.isArray(data)) return [];

  // First pass: collect all raw entries
  const raw = [];
  data.forEach(entry => {
    if (typeof entry !== 'object' || !entry.fl) return;
    const hw = (entry.hwi?.hw || '').replace(/\*/g, '');
    if (hw && hw.toLowerCase() !== word.toLowerCase()) return;

    const pos = entry.fl;

    // US pronunciation only - MW audio URL always points to US
    // Filter prs to US only by checking audio filename (US files don't have _gb suffix)
    let ipa = '';
    let audioFile = '';
    const allPrs = entry.hwi?.prs || entry.hwi?.altprs || entry.vrs?.[0]?.prs || [];
    // Pick first prs entry (MW collegiate = US by default)
    // Skip entries where audio contains 'gb' or '_uk' (British)
    const usPrs = allPrs.filter(p => {
      const a = p.sound?.audio || '';
      return !a.includes('_gb') && !a.includes('_uk');
    });
    const pr = usPrs[0] || allPrs[0];
    let ipaStandard = ''; // 표준 IPA (슬래시 표기)
    if (pr) {
      if (pr.mw) {
        ipa = pr.mw; // MW 발음기호 (기존 유지)
      }
      if (pr.ipa) {
        ipaStandard = '/' + pr.ipa + '/'; // 표준 IPA
      }
      const audio = pr.sound?.audio || '';
      if (audio) {
        const subdir = audio.startsWith('bix') ? 'bix' :
                       audio.startsWith('gg') ? 'gg' :
                       /^[^a-zA-Z]/.test(audio) ? 'number' :
                       audio[0];
        audioFile = 'https://media.merriam-webster.com/audio/prons/en/us/mp3/' + subdir + '/' + audio + '.mp3';
      }
    }
    if (!ipa && entry.hwi?.pr) ipa = entry.hwi.pr;

    // Get definitions
    const defs = [];
    const sseq = entry.def?.[0]?.sseq || [];
    function extractSense(sense) {
      const dtArr = sense.dt || [];
      let defText = '';
      let examples = [];
      dtArr.forEach(dtItem => {
        if (dtItem[0] === 'text') {
          let t = dtItem[1];
          // Handle MW inline tags properly
          t = t.replace(/\{bc\}/g, ': ');
          t = t.replace(/\{ldquo\}/g, '"').replace(/\{rdquo\}/g, '"');
          t = t.replace(/\{it\}(.*?)\{\/it\}/g, '$1');
          t = t.replace(/\{b\}(.*?)\{\/b\}/g, '$1');
          t = t.replace(/\{inf\}(.*?)\{\/inf\}/g, '$1');
          t = t.replace(/\{sup\}(.*?)\{\/sup\}/g, '$1');
          // {sx|word|hw|sense} = synonym cross-ref → keep the word
          t = t.replace(/\{sx\|([^|]+)\|[^}]*\}/g, '$1');
          // {a_link|word} or {d_link|word|id} → keep word
          t = t.replace(/\{[a-z_]*link\|([^|\}]+)[^}]*\}/g, '$1');
          // {gloss|text} → (text)
          t = t.replace(/\{gloss\}(.*?)\{\/gloss\}/g, '($1)');
          // {parahw|word} → word
          t = t.replace(/\{parahw\}(.*?)\{\/parahw\}/g, '$1');
          // {phrase} tags
          t = t.replace(/\{phrase\}(.*?)\{\/phrase\}/g, '$1');
          // remove any remaining tags
          t = t.replace(/\{[^}]+\}/g, '');
          t = t.replace(/^\s*:\s*/, '').trim();
          // Remove trailing " : synonym" pattern (MW cross-reference)
          t = t.replace(/\s*:\s*\w+\s*$/, '').trim();
          if (t) defText = t;
        }
        if (dtItem[0] === 'vis') {
          dtItem[1].slice(0, 2).forEach(v => {
            let ex = v.t || '';
            ex = ex.replace(/\{it\}(.*?)\{\/it\}/g, '$1');
            ex = ex.replace(/\{[^}]+\}/g, '').trim();
            if (ex) examples.push(ex);
          });
        }
      });
      return defText ? { text: defText, examples } : null;
    }

    sseq.forEach(senseGroup => {
      senseGroup.forEach(senseItem => {
        const type = senseItem[0];
        if (type === 'sense') {
          const d = extractSense(senseItem[1]);
          if (d) defs.push(d);
        } else if (type === 'bs') {
          // binding substitute - has sense inside
          const inner = senseItem[1]?.sense;
          if (inner) { const d = extractSense(inner); if (d) defs.push(d); }
        } else if (type === 'sen') {
          // truncated sense - skip (no definition text)
        } else if (type === 'pseq') {
          // parenthesized sequence
          senseItem[1].forEach(sub => {
            if (sub[0] === 'sense') { const d = extractSense(sub[1]); if (d) defs.push(d); }
            if (sub[0] === 'bs') {
              const inner = sub[1]?.sense;
              if (inner) { const d = extractSense(inner); if (d) defs.push(d); }
            }
          });
        }
      });
    });

    raw.push({ pos, ipa, ipaStandard, audioFile, defs });
  });

  // Second pass: merge entries with the same POS
  // Keep pronunciation from the FIRST occurrence of each POS
  const merged = [];
  const posMap = {};
  raw.forEach(entry => {
    if (!posMap[entry.pos]) {
      posMap[entry.pos] = { pos: entry.pos, ipa: entry.ipa, ipaStandard: entry.ipaStandard, audioFile: entry.audioFile, defs: [...entry.defs] };
      merged.push(posMap[entry.pos]);
    } else {
      // Merge definitions into existing entry
      entry.defs.forEach(d => posMap[entry.pos].defs.push(d));
      // Use pronunciation if current entry has none
      if (!posMap[entry.pos].ipa && entry.ipa) {
        posMap[entry.pos].ipa = entry.ipa;
        posMap[entry.pos].audioFile = entry.audioFile;
      }
    }
  });

  // Also deduplicate pronunciations in renderResult
  // by filtering out entries with duplicate POS (already merged above)
  return merged;
}

// Parse MW Thesaurus entries
function parseMWThes(data, word) {
  // Returns { pos: { syns: [{word, sense}], ants: [] } }
  const result = {};
  if (!Array.isArray(data)) return result;

  data.forEach(entry => {
    if (typeof entry !== 'object' || !entry.fl) return;
    const hw = (entry.hwi?.hw || '').replace(/\*/g, '');
    if (hw && hw.toLowerCase() !== word.toLowerCase()) return;

    const pos = entry.fl;
    if (!result[pos]) result[pos] = [];

    const sseq = entry.def?.[0]?.sseq || [];
    sseq.forEach(senseGroup => {
      senseGroup.forEach(senseItem => {
        if (senseItem[0] !== 'sense') return;
        const sense = senseItem[1];

        // Get sense label
        const senseLabel = sense.sn || '';
        let defText = '';
        sense.dt?.forEach(dtItem => {
          if (dtItem[0] === 'text') {
            defText = dtItem[1].replace(/\{[^}]+\}/g, '').replace(/^\s*:\s*/, '').trim();
          }
        });

        // Collect synonyms with strength
        const strongest = [];
        const strong = [];
        const weak = [];

        // syn_list = true synonyms (strongest)
        (sense.syn_list || []).forEach(g => g.forEach(s => { if (s.wd) strongest.push(s.wd); }));
        // sim_list = similar words (strong)
        (sense.sim_list || []).forEach(g => g.forEach(s => { if (s.wd) strong.push(s.wd); }));
        // rel_list = related words (weak)
        (sense.rel_list || []).forEach(g => g.forEach(s => { if (s.wd) weak.push(s.wd); }));

        if (strongest.length || strong.length || weak.length) {
          result[pos].push({ senseLabel, defText, strongest, strong, weak });
        }
      });
    });
  });

  return result;
}

// ==================== SEARCH ====================
async function searchWord() {
  const word = document.getElementById('search-input').value.trim().toLowerCase();
  if (!word) return;

  const resultArea = document.getElementById('result-area');
  resultArea.innerHTML = '<div class="loading"><div class="spinner"></div><p>검색 중...</p></div>';

  const oldBtn = document.getElementById('save-btn');
  if (oldBtn) oldBtn.remove();

  try {
    // Fetch MW Dictionary + Thesaurus + syllable + Free Dict IPA + collocations in parallel
    const [mwDictRes, mwThesRes, syllableRes, freeDictRes, collocRcRes, collocLcRes, collocAdjRes] = await Promise.all([
      fetch(`https://www.dictionaryapi.com/api/v3/references/collegiate/json/${word}?key=${MW_DICT_KEY}`),
      fetch(`https://www.dictionaryapi.com/api/v3/references/thesaurus/json/${word}?key=${MW_THES_KEY}`),
      fetch(`https://api.datamuse.com/words?sp=${word}&md=s&max=1`),
      fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).catch(() => null),
      fetch(`https://api.datamuse.com/words?rc=${word}&max=40`).catch(() => null),
      fetch(`https://api.datamuse.com/words?lc=${word}&max=40`).catch(() => null),
      fetch(`https://api.datamuse.com/words?rel_jjb=${word}&max=20`).catch(() => null)
    ]);

    const mwDictData = await mwDictRes.json();
    const mwThesData = await mwThesRes.json();
    const syllableData = await syllableRes.json();

    // Check if word found (MW returns array of strings for suggestions if not found)
    if (!Array.isArray(mwDictData) || mwDictData.length === 0 || typeof mwDictData[0] === 'string') {
      const suggestions = typeof mwDictData[0] === 'string' ? mwDictData.slice(0, 5) : [];
      resultArea.innerHTML = `<div class="error-msg">
        ❌ "<strong>${word}</strong>" 단어를 찾을 수 없어요.
        ${suggestions.length ? `<br><br>혹시 이 단어를 찾으셨나요?<br>${suggestions.map(s => `<span class="syn-chip" onclick="searchFromSynonym('${s}')" style="display:inline-block;margin:4px">${s}</span>`).join('')}` : ''}
      </div>`;
      return;
    }

    // Parse syllable
    let syllableCount = null;
    let syllableText = null;
    if (syllableData.length > 0) {
      syllableCount = syllableData[0].numSyllables || null;
      // MW dictionary provides syllable dots in hw field
    }
    // Get syllable from MW hw field (uses * for syllable breaks)
    const mwHw = mwDictData[0]?.hwi?.hw || '';
    if (mwHw.includes('*')) {
      syllableText = mwHw.replace(/\*/g, '·');
      if (!syllableCount) syllableCount = syllableText.split('·').length;
    }

    // Parse entries
    const entries = parseMWDict(mwDictData, word);
    const thesaurus = parseMWThes(mwThesData, word);

    // Extract IPA from Free Dictionary API
    let freeIpa = '';
    try {
      const freeDictData = freeDictRes ? await freeDictRes.json() : [];
      if (Array.isArray(freeDictData) && freeDictData[0]) {
        // Prefer US English IPA (phonetics with audio URL containing 'en-US' or no locale tag)
        const phonetics = freeDictData[0].phonetics || [];
        const usPhonetic = phonetics.find(p => p.text && p.audio && p.audio.includes('-us-')) ||
                           phonetics.find(p => p.text && p.audio && !p.audio.includes('-uk-') && !p.audio.includes('-gb-')) ||
                           phonetics.find(p => p.text) ||
                           null;
        freeIpa = usPhonetic?.text || freeDictData[0].phonetic || '';
      }
    } catch(e) {}

    // Parse collocations
    let collocations = { after: [], before: [], adjectives: [] };
    try {
      const [afterData, beforeData, adjData] = await Promise.all([
        collocRcRes ? collocRcRes.json() : Promise.resolve([]),
        collocLcRes ? collocLcRes.json() : Promise.resolve([]),
        collocAdjRes ? collocAdjRes.json() : Promise.resolve([])
      ]);
      collocations.after = Array.isArray(afterData) ? afterData : [];
      collocations.before = Array.isArray(beforeData) ? beforeData : [];
      collocations.adjectives = Array.isArray(adjData) ? adjData : [];
    } catch(e) {}

    currentWord = { word, entries, thesaurus, syllableCount, syllableText, freeIpa, collocations };
    addToHistory(word);
    // Fetch DeepL translations for each definition, then re-render
    await fetchKoreanTranslations(word);
    renderResult();

    // Save button - recreate after render
    updateSaveBtn(word);

  } catch (e) {
    console.error(e);
    resultArea.innerHTML = `<div class="error-msg">오류가 발생했어요. 인터넷 연결을 확인해주세요.</div>`;
  }
}

// Korean translation via DeepL - translates each definition sentence
// Korean meanings via KRDict + MyMemory fallback
const KRDICT_KEY = 'B760CF4A944ED0A7DCE98BF6FABBCB80';
const koreanPosCache = {}; // "word" -> {noun: ["의미1","의미2"], verb: [...]}

async function fetchKoreanFromKRDict(word) {
  const w = word.toLowerCase();
  if (koreanPosCache[w]) return;
  try {
    const url = `https://krdict.korean.go.kr/api/search?key=${KRDICT_KEY}&q=${encodeURIComponent(word)}&translated=y&trans_lang=1&part=word&sort=popular&num=10`;
    const res = await fetch(url);
    const text = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');
    const items = xml.querySelectorAll('item');
    const posMap = {
      '명사':'noun','동사':'verb','형용사':'adjective',
      '부사':'adverb','대명사':'pronoun','감탄사':'interjection','관형사':'adjective'
    };
    const result = {};
    items.forEach(item => {
      const posKr = item.querySelector('pos') ? item.querySelector('pos').textContent : '';
      const pos = posMap[posKr] || 'noun';
      item.querySelectorAll('sense > translation > trans_word').forEach(el => {
        const t = el.textContent.trim();
        if (!t) return;
        if (!result[pos]) result[pos] = [];
        if (!result[pos].includes(t)) result[pos].push(t);
      });
    });
    if (Object.keys(result).length > 0) koreanPosCache[w] = result;
  } catch(e) {}
}

async function fetchKoreanTranslations(word) {
  const w = word.toLowerCase();
  if (koreanDefMap[w] || koreanDict[w]) return;
  await fetchKoreanFromKRDict(word);
  // No fallback - KRDict only. If not found, Korean section won't show.
}

function getKoreanForPos(word, pos) {
  const w = word.toLowerCase();
  if (koreanDefMap[w] && koreanDefMap[w][pos]) return koreanDefMap[w][pos].join(', ');
  if (koreanDict[w] && koreanDict[w][pos]) return koreanDict[w][pos];
  if (koreanPosCache[w] && koreanPosCache[w][pos]) return koreanPosCache[w][pos].slice(0,4).join(', ');
  // No cross-pos fallback: if this pos has no Korean, return null
  return null;
}

function getKoreanFallback(word, pos, defIndex) { return null; }

function renderResult() {
  const { word, entries, thesaurus, syllableCount, syllableText, freeIpa } = currentWord;
  let html = '';

  // Word title
  html += `<div class="word-title">${word}</div>`;

  // Syllable
  if (syllableCount || syllableText) {
    html += `<div class="syllable-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      음절 개수 : ${syllableCount || '?'} (${syllableText || word})
    </div>`;
  }

  // Pronunciations - group POS with identical IPA+audio into one card
  {
    const pronGroups = [];
    entries.forEach(e => {
      const key = (e.ipa || '') + '|' + (e.audioFile || '');
      const existing = pronGroups.find(g => g.key === key);
      if (existing) {
        existing.posList.push(e.pos);
      } else {
        pronGroups.push({ key, ipa: e.ipa, ipaStandard: e.ipaStandard, audioFile: e.audioFile, posList: [e.pos] });
      }
    });

    const pronCards = [];
    pronGroups.forEach((g, idx) => {
      // IPA 우선순위: first card uses best available IPA, others use their own
      let showIpa = '';
      if (idx === 0) {
        showIpa = pronGroups.find(vg => vg.ipaStandard)?.ipaStandard || freeIpa || (g.ipa ? '/' + g.ipa + '/' : '');
      } else {
        showIpa = g.ipaStandard || (g.ipa ? '/' + g.ipa + '/' : '');
      }
      // Skip card if nothing to show
      if (!showIpa && !g.audioFile) return;

      const showLabel = pronGroups.length > 1 || g.posList.length > 1;
      const posLabel = showLabel ? g.posList.join(' · ') : null;
      pronCards.push(makePronCard(posLabel, showIpa, g.audioFile));
    });

    // Only show section if at least one card has content
    if (pronCards.length > 0) {
      html += '<div class="section-title">발음 / Pronunciation</div>';
      html += pronCards.join('');
    }
  }

  // 한글 의미 섹션 (품사별)
  const hasKorean = entries.some(e => getKoreanForPos(word, e.pos));
  if (hasKorean) {
    html += `<div class="section-title">한글 의미 / Korean</div>`;
    html += `<div class="korean-meanings-block">`;
    entries.forEach(entry => {
      const kr = getKoreanForPos(word, entry.pos);
      if (!kr) return;
      html += `<div class="korean-meaning-row">
        <span class="pos-badge pos-${entry.pos}" style="flex-shrink:0">${entry.pos} ${getPosKorean(entry.pos)}</span>
        <span class="korean-meaning-text">${kr}</span>
      </div>`;
    });
    html += `</div>`;
  }

  // Definitions per POS entry (영어만)
  html += `<div class="section-title">영어 정의 / Definitions</div>`;
  entries.forEach(entry => {
    const { pos, defs } = entry;
    if (!defs || defs.length === 0) return;
    html += `<div class="def-group">
      <div class="def-group-header">
        <span class="pos-badge pos-${pos}">${pos} ${getPosKorean(pos)}</span>
      </div>`;
    defs.slice(0, 5).forEach((def, i) => {
      html += `<div class="def-item">
        <div style="display:flex;align-items:flex-start;gap:8px">
          <span class="def-num">${i + 1}</span>
          <div style="flex:1">
            <div class="def-text">${def.text}</div>
            ${def.examples.length > 0 ? `<div class="def-example">"${def.examples[0]}"</div>` : ''}
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  // Synonyms from MW Thesaurus - grouped by POS then by sense
  html += renderSynonyms();
  html += renderCollocations();

  document.getElementById('result-area').innerHTML = html;
}

// Store audio URLs separately to avoid HTML encoding issues
const audioStore = {};

function makePronCard(pos, ipa, audioUrl) {
  const audioId = 'audio_' + Math.random().toString(36).substr(2, 8);
  const hasAudio = audioUrl && audioUrl.length > 0;
  let fixedUrl = audioUrl;
  if (fixedUrl && fixedUrl.startsWith('//')) fixedUrl = 'https:' + fixedUrl;
  if (hasAudio) audioStore[audioId] = fixedUrl;

  return `<div class="pron-card">
    <div style="display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap;">
      ${pos ? `<span class="pos-badge pos-${pos.split(' · ')[0]}">${pos.split(' · ').map(p => p + ' ' + getPosKorean(p)).join(' · ')}</span>` : ''}
      ${ipa ? `<span class="ipa" style="font-family:'Noto Sans',sans-serif;font-size:17px;">${ipa}</span>` : ''}
    </div>
    ${hasAudio
      ? `<button class="audio-btn" id="${audioId}" onclick="playAudio('${audioId}')" title="발음 듣기">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>`
      : ''}
  </div>`;
}

function playAudio(audioId) {
  const url = audioStore[audioId];
  if (!url) return;
  const audio = new Audio(url);
  const btn = document.getElementById(audioId);
  if (btn) btn.classList.add('playing');
  audio.play().catch(e => console.log('Audio error:', e));
  audio.onended = () => { if (btn) btn.classList.remove('playing'); };
  audio.onerror = () => { if (btn) btn.classList.remove('playing'); };
}

function getPosKorean(pos) {
  const map = { noun: '명사', verb: '동사', adjective: '형용사', adverb: '부사', pronoun: '대명사', preposition: '전치사', conjunction: '접속사', interjection: '감탄사', exclamation: '감탄사' };
  return map[pos] || '';
}

function renderSynonyms() {
  const { thesaurus, word, entries } = currentWord;
  const dictPosList = entries ? entries.map(e => e.pos) : [];

  let html = `<div class="section-title">동의어 / Synonyms</div>`;
  let hasAny = false;

  // 내장 synDict 우선 사용
  const builtinEntry = synDict[word.toLowerCase()];
  if (builtinEntry) {
    Object.entries(builtinEntry).forEach(([pos, data]) => {
      if (!dictPosList.includes(pos)) return;
      const { strong, mid } = data;
      hasAny = true;
      html += `<div class="syn-group">
        <div class="syn-group-title">
          <span class="pos-badge syn-label pos-${pos}">${pos} ${getPosKorean(pos)} 동의어</span>
        </div>`;
      if (strong && strong.length) {
        html += `<div class="syn-level high">매우 유사 (${strong.length})</div>
          <div class="syn-chips">${strong.map(w => `<span class="syn-chip" onclick="searchFromSynonym('${w}')">${w}</span>`).join('')}</div>`;
      }
      if (mid && mid.length) {
        html += `<div class="syn-level mid">유사 (${mid.length})</div>
          <div class="syn-chips">${mid.map(w => `<span class="syn-chip" onclick="searchFromSynonym('${w}')">${w}</span>`).join('')}</div>`;
      }
      html += `</div>`;
    });
    if (hasAny) return html;
  }

  // 내장 없으면 MW Thesaurus 사용
  if (!thesaurus || Object.keys(thesaurus).length === 0) return '';

  Object.entries(thesaurus).forEach(([pos, senses]) => {
    if (!senses || senses.length === 0) return;
    if (!dictPosList.includes(pos)) return;

    const topSenses = senses.slice(0, 2);
    topSenses.forEach((sense) => {
      const { strongest, strong, weak, defText } = sense;
      if (!strongest.length && !strong.length && !weak.length) return;

      let asInText = '';
      if (defText) {
        const cleaned = defText.replace(/^(as in\s+|:\s*|as\s+)/i, '').trim();
        asInText = cleaned;
      } else {
        asInText = strongest[0] || strong[0] || '';
      }
      const asIn = asInText ? `"${asInText}"` : '';

      hasAny = true;
      html += `<div class="syn-group">
        <div class="syn-group-title">
          <span class="pos-badge syn-label pos-${pos}">${pos} ${getPosKorean(pos)} 동의어${asIn ? `<span class="as-in-text">as in ${asIn}</span>` : ''}</span>
        </div>`;

      if (strongest.length) {
        const top = strongest.slice(0, 5);
        const rest = strongest.slice(5, 10);
        html += `<div class="syn-level high">매우 유사 (${top.length})</div>
          <div class="syn-chips">${top.map(w => `<span class="syn-chip" onclick="searchFromSynonym('${w}')">${w}</span>`).join('')}</div>`;
        const similarList = strong.length ? strong.slice(0, 8) : rest;
        if (similarList.length) {
          html += `<div class="syn-level mid">유사 (${similarList.length})</div>
            <div class="syn-chips">${similarList.map(w => `<span class="syn-chip" onclick="searchFromSynonym('${w}')">${w}</span>`).join('')}</div>`;
        }
      } else if (strong.length) {
        const topStrong = strong.slice(0, 8);
        html += `<div class="syn-level mid">유사 (${topStrong.length})</div>
          <div class="syn-chips">${topStrong.map(w => `<span class="syn-chip" onclick="searchFromSynonym('${w}')">${w}</span>`).join('')}</div>`;
      }

      html += `</div>`;
    });
  });

  return hasAny ? html : '';
}

function searchFromSynonym(word) {
  document.getElementById('search-input').value = word;
  searchWord();
  window.scrollTo(0, 0);
}

    adj: ['right', 'exact', 'common', 'spoken', 'written', 'key', 'single'],
    phrases: ['in other words', 'use the right word', 'find the right word', 'written word', 'word for word']
  },
  work: {
    verb: ['do', 'carry out', 'find', 'look for', 'get', 'create', 'start', 'stop'],
    prep: ['on', 'in', 'for'],
    adj: ['hard', 'good', 'creative', 'voluntary', 'paid', 'unpaid', 'skilled'],
    phrases: ['hard work', 'at work', 'in work', 'go to work', 'out of work', 'get to work', 'carry out work']
  }
};

function renderCollocations() {
  const { collocations, word, entries } = currentWord;
  if (!collocations) return '';

  const w = word.toLowerCase();
  const builtin = collocDict[w];
  const { after, before, adjectives } = collocations;

  // MW 예문 수집
  const examples = [];
  if (entries) {
    entries.forEach(e => {
      e.defs.forEach(d => {
        (d.examples || []).forEach(ex => {
          if (ex && ex.toLowerCase().includes(w) && ex.length < 100) examples.push(ex);
        });
      });
    });
  }

  // 내장 데이터 있으면 우선 사용
  if (builtin) {
    let html = `<div class="section-title">콜로케이션 / Collocations</div><div class="colloc-group">`;

    // phrases가 있으면 주요 표현 먼저, 그 다음 기존 방식도 함께 표시
    if (builtin.phrases && builtin.phrases.length) {
      html += `<div class="colloc-category"><span class="cat-label">주요 표현</span></div>
        <div class="colloc-chips">${builtin.phrases.map(p => `<span class="colloc-chip">${p}</span>`).join('')}</div>`;
    }
    if (builtin.verb && builtin.verb.length) {
      html += `<div class="colloc-category"><span class="cat-label">동사</span>... + ${word}</div>
        <div class="colloc-chips">${builtin.verb.slice(0,8).map(v => `<span class="colloc-chip"><strong>${v}</strong> ${word}</span>`).join('')}</div>`;
    }
    if (builtin.adj && builtin.adj.length) {
      html += `<div class="colloc-category"><span class="cat-label">수식어</span>... + ${word}</div>
        <div class="colloc-chips">${builtin.adj.slice(0,8).map(a => `<span class="colloc-chip"><strong>${a}</strong> ${word}</span>`).join('')}</div>`;
    }
    if (builtin.prep && builtin.prep.length) {
      html += `<div class="colloc-category"><span class="cat-label">전치사</span>${word} + ...</div>
        <div class="colloc-chips">${builtin.prep.map(p => `<span class="colloc-chip">${word} <strong>${p}</strong></span>`).join('')}</div>`;
    }
    html += `</div>`;
    return html;
  }

  // 내장 없으면 Datamuse 데이터 사용
  const prepositions = new Set(['in','on','of','for','to','with','by','at','from','about','into','through','over','between','after','before','under','against','during','without','within','along','across','behind','upon','versus']);
  const skipWords = new Set(['a','an','the','this','that','these','those','its','their','our','my','your','his','her','and','or','but','so','is','are','was','were','be','been','have','has','had','do','does','did','not','no','yes','i','he','she','we','they','it','who','which','what']);

  const afterPreps = after.filter(w => prepositions.has(w.word)).map(w => w.word);

  if (!afterPreps.length) return '';

  let html = `<div class="section-title">콜로케이션 / Collocations</div><div class="colloc-group">`;
  if (afterPreps.length) {
    html += `<div class="colloc-category"><span class="cat-label">전치사</span>${word} + ...</div>
      <div class="colloc-chips">${afterPreps.slice(0,6).map(p => `<span class="colloc-chip">${word} <strong>${p}</strong></span>`).join('')}</div>`;
  }
  html += `</div>`;
  return html;
}

// ==================== HISTORY ====================
function addToHistory(word) {
  let history = JSON.parse(localStorage.getItem('lexica_history') || '[]');
  history = history.filter(h => h.word !== word);
  history.unshift({ word, time: new Date().toISOString() });
  history = history.slice(0, 50);
  localStorage.setItem('lexica_history', JSON.stringify(history));
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem('lexica_history') || '[]');
  document.getElementById('history-count').textContent = `검색 기록 ${history.length}개`;
  const list = document.getElementById('history-list');
  if (history.length === 0) {
    list.innerHTML = '<div class="empty-state"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>검색 기록이 없어요</p></div>';
    return;
  }
  list.innerHTML = history.map(h => {
    const date = new Date(h.time);
    const timeStr = date.toLocaleDateString('ko-KR') + ' ' + date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    return `<div class="history-item" onclick="searchFromHistory('${h.word}')">
      <div>
        <div class="history-word">${h.word}</div>
        <div class="history-time">${timeStr}</div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text2)"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`;
  }).join('');
}

function searchFromHistory(word) {
  document.getElementById('search-input').value = word;
  showPageDirect('search');
  searchWord();
}

function clearHistory() {
  if (confirm('검색 기록을 모두 삭제할까요?')) {
    localStorage.removeItem('lexica_history');
    renderHistory();
  }
}

// ==================== VOCABULARY ====================
function isInVocab(word) {
  const vocab = JSON.parse(localStorage.getItem('lexica_vocab') || '[]');
  return vocab.some(v => v.word === word);
}

function toggleVocab() {
  if (!currentWord) return;
  const word = currentWord.word;
  let vocab = JSON.parse(localStorage.getItem('lexica_vocab') || '[]');
  if (isInVocab(word)) {
    vocab = vocab.filter(v => v.word !== word);
  } else {
    vocab.unshift({ word, date: new Date().toISOString() });
    if (vocab.length > 200) vocab = vocab.slice(0, 200);
  }
  localStorage.setItem('lexica_vocab', JSON.stringify(vocab));
  updateSaveBtn(word);
}

function renderVocab() {
  const vocab = JSON.parse(localStorage.getItem('lexica_vocab') || '[]');
  document.getElementById('vocab-count').textContent = `저장된 단어 ${vocab.length}개`;
  const list = document.getElementById('vocab-list');
  if (vocab.length === 0) {
    list.innerHTML = '<div class="empty-state"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><p>저장된 단어가 없어요</p><p style="font-size:13px;margin-top:8px">검색 후 ＋ 버튼을 눌러 저장하세요</p></div>';
    return;
  }
  list.innerHTML = vocab.map((v, i) => `
    <div class="vocab-item" onclick="searchFromHistory('${v.word}')">
      <button class="vocab-delete" onclick="deleteVocab(event,${i})">✕</button>
      <div class="vocab-word">${v.word}</div>
      <div class="vocab-info">${v.pos ? getPosKorean(v.pos) + ' • ' : ''}${v.firstDef ? v.firstDef.substring(0, 60) + (v.firstDef.length > 60 ? '...' : '') : ''}</div>
    </div>`).join('');
}

function deleteVocab(e, index) {
  e.stopPropagation();
  let vocab = JSON.parse(localStorage.getItem('lexica_vocab') || '[]');
  vocab.splice(index, 1);
  localStorage.setItem('lexica_vocab', JSON.stringify(vocab));
  renderVocab();
}

function clearVocab() {
  if (confirm('단어장을 모두 삭제할까요?')) {
    localStorage.removeItem('lexica_vocab');
    renderVocab();
  }
}

function showPageDirect(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelector(`.nav-btn:first-child`).classList.add('active');
}
